<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golf Simulator 3D</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="start-screen">
      <h1>⛳ Golf Simulator 3D</h1>
      <p>18-Hole Championship Course</p>
      <button id="start-btn">Start Game</button>
    </div>
    <div id="game-screen" style="display: none;">
      <div id="hud">
        <div id="course-info">
          <div><strong>Hole:</strong> <span id="hole-number">1</span>/18</div>
          <div><strong>Distance to Pin:</strong> <span id="distance">400</span>m</div>
          <div><strong>Strokes:</strong> <span id="strokes">0</span></div>
          <div><strong>Current Shot Distance:</strong> <span id="shot-distance">0</span>m</div>
        </div>
      </div>

      <div id="game-container">
        <canvas id="three-canvas"></canvas>
      </div>

      <div id="club-selection" style="display: none;">
        <p>Select Club:</p>
        <div id="club-buttons"></div>
      </div>

      <div id="meter-container" style="display: none;">
        <div id="power-meter-label">POWER</div>
        <div id="power-meter-bg" class="meter-bg">
          <div id="power-meter" class="meter"></div>
          <div id="power-indicator" class="indicator"></div>
        </div>
      </div>

      <div id="accuracy-game" style="display: none;">
        <h3>ACCURACY CHALLENGE - Click the targets!</h3>
        <canvas id="target-canvas"></canvas>
        <div id="accuracy-game-info">
          <div>Targets Hit: <span id="targets-hit">0</span>/10</div>
          <div>Time: <span id="game-timer">3</span>s</div>
        </div>
      </div>

      <div id="instruction"></div>
      <div id="result-message"></div>
      
      <div id="hole-result" style="display: none;">
        <p id="score-result"></p>
        <button id="next-shot-btn">Next Shot</button>
      </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
    <script src="script.js"></script>
  </body>
</html>
